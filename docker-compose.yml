version: "3.9"

services:

  backend:
    image: santoshgudikandula/my_private_repo:redislocal
    container_name: fastapi_backend

    ports:
      - "5454:5454"

    depends_on:
      - redis

    environment:
      REDIS_URL: redis://redis:6379/1

  redis:
    image: redis:7-alpine
    container_name: redis_server

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

  prometheus:
    image: prom/prometheus
    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      - backend

  grafana:
    image: grafana/grafana
    container_name: grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus

volumes:
  redis_data:
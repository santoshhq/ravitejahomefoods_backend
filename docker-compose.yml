version: "3.9"

services:

  backend:
    image: santoshgudikandula/my_private_repo:reviewsadded
    container_name: fastapi_backend

    ports:
      - "5454:5454"

  prometheus:
    image: prom/prometheus
    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      - backend

  grafana:
    image: grafana/grafana
    container_name: grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus